{% extends "paste-base.html" %}
{% block paste_body %}
<div class="container">
  <div class="row">
    <div class="col-md-6">
      <h4>Visibility</h4>
      <form method="POST">
        {{csrf_token()}}
        <fieldset class="form-group">
          <div class="form-check form-check-inline">
            <label
              class="form-check-label"
              title="Publically visible and listed on your profile"
            >
              <input
                class="form-check-input"
                type="radio"
                name="visibility"
                value="PUBLIC"
                {{ "checked" if paste.visibility == Visibility.PUBLIC else "" }}
              > Public
            </label>
          </div>
              <div class="form-check form-check-inline">
                <label
                  class="form-check-label"
                  title="Visible to anyone with the link, but not shown on your profile"
                >
                  <input
                    class="form-check-input"
                    type="radio"
                    name="visibility"
                    value="UNLISTED"
                    {{ "checked" if paste.visibility == Visibility.UNLISTED else "" }}
                  > Unlisted
                </label>
              </div>
                  <div class="form-check form-check-inline">
                    <label
                      class="form-check-label"
                      title="Only visible to you"
                    >
                      <input
                        class="form-check-input"
                        type="radio"
                        name="visibility"
                        value="PRIVATE"
                        {{ "checked" if paste.visibility == Visibility.PRIVATE else "" }}
                      > Private
                    </label>
                  </div>
        </fieldset>
        <button type="submit" class="btn btn-primary pull-right">
          Save {{icon("caret-right")}}
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
