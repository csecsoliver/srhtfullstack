{% extends "meta.html" %}
{% block title %}
<title>Profile - {{cfg("sr.ht", "site-name")}} meta</title>
{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-8 offset-md-2">
    <h3>Remove your avatar?</h3>
    <form method="POST">
      {{csrf_token()}}
      <div class="avatar-form row">
        <div class="col-md-3">
          <img
            src="{{avatar_url(current_user)}}"
            alt="{{current_user.username}}'s avatar" />
        </div>
        <div class="col-md-9">
          <p>
            Remove this avatar?
          </p>

          <button type="submit" class="btn btn-danger">
            Remove avatar {{icon("caret-right")}}
          </button>
          <a href="{{url_for('.profile_GET')}}" class="btn btn-default">
            Cancel {{icon("caret-right")}}
          </a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
